<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found · Cyflow Social</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon-32.png" />
  <link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png" />
  <!--
    The local design system, not a CDN. This page used to pull
    https://cdn.tailwindcss.com at runtime, which is why the app's CSP still
    permitted a third-party script host and 'unsafe-eval'. It was also the only
    page still painted in the retired indigo. Both are fixed here, and the CSP
    is tightened in src/app.js to match.
  -->
  <link rel="stylesheet" href="/assets/css/design-system.css" />
</head>
<body>
  <main class="notfound" id="main">
    <div class="notfound-inner">
      <img src="/assets/brand/cyflow-mark-192.png" alt="" width="56" height="56" />
      <p class="notfound-code">404</p>
      <h1>Page not found</h1>
      <p class="sub">The page you are looking for does not exist or has moved.</p>
      <a class="btn btn-primary" href="/">Back to Cyflow Social</a>
    </div>
  </main>
</body>
</html>
