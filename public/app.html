<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cyflow Social — generate, schedule, and publish social content for Facebook Pages, Instagram Professional, and Threads." />
  <title>Cyflow Social</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/design-system.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <!-- Mobile top bar (hidden on desktop) -->
  <header class="topbar" id="topbar">
    <button class="icon-btn" id="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
      <span class="hamburger" aria-hidden="true"></span>
    </button>
    <a class="brand" href="/dashboard" data-link>
      <img src="/assets/favicon.svg" alt="" width="24" height="24" />
      <span>Cyflow&nbsp;Social</span>
    </a>
  </header>

  <div class="shell" id="shell">
    <!-- Sidebar / mobile drawer -->
    <nav class="sidebar" id="sidebar" aria-label="Main navigation">
      <div class="sidebar-head">
        <a class="brand" href="/dashboard" data-link>
          <img src="/assets/favicon.svg" alt="" width="26" height="26" />
          <span>Cyflow&nbsp;Social</span>
        </a>
        <button class="icon-btn drawer-close" id="nav-close" type="button" aria-label="Close menu">✕</button>
      </div>
      <ul class="nav-list" id="nav-list"><!-- built by nav.js --></ul>
      <div class="sidebar-foot">
        <div class="nav-user" id="nav-user" hidden>
          <span class="nav-user-name" id="nav-user-name"></span>
          <button class="btn btn-ghost btn-sm" id="logout-btn" type="button">Log out</button>
        </div>
      </div>
    </nav>
    <div class="scrim" id="scrim" hidden></div>

    <!-- Route content -->
    <main class="main" id="main" tabindex="-1">
      <div id="route-root" aria-live="polite"></div>
    </main>
  </div>

  <!-- Toasts + modal host -->
  <div class="toasts" id="toasts" role="status" aria-live="polite"></div>
  <div class="modal-host" id="modal-host" hidden></div>

  <script type="module" src="/assets/js/main.js"></script>
  <noscript>
    <p style="padding:2rem;font-family:system-ui">Cyflow Social requires JavaScript.</p>
  </noscript>
</body>
</html>
