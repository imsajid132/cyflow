# Cyflow — one-click Render blueprint. Provisions Postgres + Redis (Key Value) +
# the API web service + the worker. After deploy, set the non-secret vars marked
# `sync: false` (WEB_APP_URL, GOOGLE_*, MICROSOFT_*) in the dashboard, then set
# VITE_CYFLOW_API_URL on Vercel to the API's URL. See README → Personal
# Production Deployment.

databases:
  - name: cyflow-postgres
    databaseName: cyflow
    user: cyflow
    plan: free

services:
  # Redis-compatible Key Value store for the BullMQ execution queue + scheduler.
  - type: keyvalue
    name: cyflow-redis
    plan: free
    ipAllowList: [] # internal only
    maxmemoryPolicy: noeviction

  # REST API + webhook receiver + OAuth. Runs migrations on boot.
  - type: web
    name: cyflow-api
    runtime: node
    plan: free
    healthCheckPath: /health
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @cyflow/db generate
    startCommand: corepack pnpm --filter @cyflow/db deploy && corepack pnpm --filter @cyflow/api start
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: cyflow-postgres, property: connectionString }
      - key: REDIS_URL
        fromService: { name: cyflow-redis, type: keyvalue, property: connectionString }
      - key: CYFLOW_ENCRYPTION_KEY
        generateValue: true # 32+ random chars — encrypts the connection vault
      - key: ADMIN_TOKEN
        generateValue: true # protects every route but /health + /hooks
      - key: WEB_APP_URL
        sync: false # your Vercel URL, e.g. https://cyflow.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false # {api}/oauth/google/callback
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        sync: false # {api}/oauth/microsoft/callback

  # Scheduled scenarios + async execution queue. Shares the same DB/Redis/vault.
  - type: worker
    name: cyflow-worker
    runtime: node
    plan: free
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @cyflow/db generate
    startCommand: corepack pnpm --filter @cyflow/worker start
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: cyflow-postgres, property: connectionString }
      - key: REDIS_URL
        fromService: { name: cyflow-redis, type: keyvalue, property: connectionString }
      - key: CYFLOW_ENCRYPTION_KEY
        fromService: { name: cyflow-api, type: web, envVarKey: CYFLOW_ENCRYPTION_KEY }
